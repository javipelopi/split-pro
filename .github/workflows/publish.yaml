name: Publish Docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Gate every Docker build on a full runtime smoke test: migrations run, the
  # app boots against a real pg_cron-capable Postgres, /api/health reports ok,
  # and the startup logs contain no prisma:error lines. This catches the class
  # of bugs where `src/instrumentation.ts` swallows setup failures via
  # `.catch(console.error)` — the previous release (v0.6.0) shipped a broken
  # pg_cron `$$`-quoted SQL call that only surfaced at runtime in production.
  smoke:
    name: Smoke test
    uses: ./.github/workflows/smoke-test.yaml

  build:
    name: Build ${{ matrix.platform }}
    needs: smoke
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          else
            echo "channel=next" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version in package.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=min,scope=${{ matrix.suffix }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.suffix }}:${{ steps.version.outputs.channel }}
            ghcr.io/${{ github.repository }}-${{ matrix.suffix }}:${{ steps.version.outputs.sha }}
            ghcr.io/${{ github.repository }}-${{ matrix.suffix }}:${{ github.ref_name }}

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          else
            echo "channel=next" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        env:
          REPO: ghcr.io/${{ github.repository }}
          CHANNEL: ${{ steps.version.outputs.channel }}
          SHA: ${{ steps.version.outputs.sha }}
          TAG: ${{ github.ref_name }}
        run: |
          for label in "$CHANNEL" "$SHA" "$TAG"; do
            docker buildx imagetools create -t "$REPO:$label" \
              "$REPO-amd64:$label" \
              "$REPO-arm64:$label"
          done
