name: Smoke Test

# Exercises the real runtime startup path against a Postgres instance with
# pg_cron installed, so bugs in `src/instrumentation.ts` and anything it calls
# (schedule setup, migrations, auth env validation) are caught before a
# release tag is cut.
#
# Failure modes this catches:
#   - instrumentation.ts errors that are normally swallowed by `.catch(console.error)`
#     now surface via the `/api/health` endpoint, which this workflow polls.
#   - `prisma:error` lines in the startup logs fail the job outright as a
#     belt-and-suspenders check.
#
# Called automatically on push to main and pull requests. Also invoked by
# `publish.yaml` as a gate before any Docker image gets built.

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  smoke:
    name: Runtime smoke test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://splitpro:password@localhost:5432/splitpro
      NEXTAUTH_SECRET: ci-smoke-test-secret
      NEXTAUTH_URL: http://localhost:3000
      ENABLE_SENDING_INVITES: 'false'
      # These two are what make instrumentation.ts actually try to schedule
      # the pg_cron job — without them the code path is skipped and we'd
      # miss the bug we're trying to catch.
      CLEAR_CACHE_CRON_RULE: '0 2 * * 0'
      CACHE_RETENTION_INTERVAL: '2 days'
      SKIP_ENV_VALIDATION: 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Postgres with pg_cron configured
        # GitHub Actions service containers don't let us override Postgres
        # command-line flags, but the migration requires pg_cron which in
        # turn requires `shared_preload_libraries=pg_cron` and
        # `cron.database_name=splitpro` to be set at server startup. Running
        # the container manually lets us pass the same -c flags that
        # docker/dev/compose.yml uses so dev and CI stay in lock step.
        run: |
          docker run -d \
            --name splitpro-smoke-db \
            -e POSTGRES_USER=splitpro \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_DB=splitpro \
            -p 5432:5432 \
            ossapps/postgres:17.7-trixie \
            postgres \
            -c shared_preload_libraries=pg_cron \
            -c cron.database_name=splitpro \
            -c cron.timezone=UTC

      - name: Wait for Postgres + verify pg_cron is loaded
        run: |
          for i in {1..60}; do
            if PGPASSWORD=password psql -h localhost -U splitpro -d splitpro -c 'SELECT 1' >/dev/null 2>&1; then
              echo "postgres is up after ${i}s"
              break
            fi
            sleep 1
          done
          # pg_cron must be preloaded, not just available — the migration
          # will fail with 'unrecognized configuration parameter
          # "cron.database_name"' if shared_preload_libraries=pg_cron isn't
          # set, so prove it's loaded before proceeding.
          PGPASSWORD=password psql -h localhost -U splitpro -d splitpro -c \
            "SHOW shared_preload_libraries;" | grep -q pg_cron || {
              echo "::error::pg_cron is not in shared_preload_libraries — dev compose and CI are out of sync"
              docker logs splitpro-smoke-db || true
              exit 1
            }
          PGPASSWORD=password psql -h localhost -U splitpro -d splitpro -c \
            "SHOW cron.database_name;" || {
              echo "::error::cron.database_name not configured"
              exit 1
            }

      - name: Apply migrations
        run: pnpm prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Start app in background
        run: |
          mkdir -p /tmp/smoke
          nohup pnpm start > /tmp/smoke/app.log 2>&1 &
          echo $! > /tmp/smoke/app.pid
          echo "Launched app with PID $(cat /tmp/smoke/app.pid)"

      - name: Wait for /api/health to report ok
        id: health
        run: |
          # Startup tasks in instrumentation.ts run inside setTimeout(10s),
          # so the cron:bank-cache check only flips to ok/failed after ~10s.
          # We poll for up to 90s.
          for i in {1..45}; do
            if body=$(curl -sS --max-time 5 http://localhost:3000/api/health 2>/dev/null); then
              echo "health body: $body"
              status=$(echo "$body" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{console.log(JSON.parse(s).status)}catch{console.log('parse-error')}})")
              pending=$(echo "$body" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{console.log(JSON.parse(s).checks.filter(c=>c.status==='pending').length)}catch{console.log('parse-error')}})")
              if [ "$status" = "ok" ] && [ "$pending" = "0" ]; then
                echo "health is ok with no pending checks"
                echo "body<<EOF" >> "$GITHUB_OUTPUT"
                echo "$body" >> "$GITHUB_OUTPUT"
                echo "EOF" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              if [ "$status" = "degraded" ]; then
                echo "::error::/api/health reports degraded: $body"
                exit 1
              fi
            fi
            sleep 2
          done
          echo "::error::/api/health did not reach ok state within 90s"
          curl -sS http://localhost:3000/api/health || true
          exit 1

      - name: Hit key routes
        run: |
          set -e
          for route in / /en/home /en/add /en/balances /en/groups; do
            code=$(curl -sS -L -o /dev/null -w "%{http_code}" "http://localhost:3000${route}")
            echo "$route -> $code"
            if [ "$code" != "200" ]; then
              echo "::error::Route $route returned HTTP $code (expected 200)"
              exit 1
            fi
          done

      - name: Scan startup logs for prisma errors
        run: |
          # Belt-and-suspenders: even if /api/health passes, any prisma:error
          # line in the startup logs is a signal that something went wrong
          # in a path that might not be covered by startup checks yet.
          if grep -E '^prisma:error|PrismaClientKnownRequestError|PrismaClientUnknownRequestError' /tmp/smoke/app.log; then
            echo "::error::Startup logs contain prisma errors — see log above"
            exit 1
          fi
          # Also catch generic 'Error creating' messages from .catch handlers
          # that haven't been wired to startupDiagnostics yet.
          if grep -E 'Error creating recurring|Error creating cron' /tmp/smoke/app.log; then
            echo "::error::Startup logs contain background task errors — see log above"
            exit 1
          fi
          echo "No prisma errors or background task errors detected in startup logs"

      - name: Dump app logs (always)
        if: always()
        run: |
          echo '::group::App startup logs'
          cat /tmp/smoke/app.log || true
          echo '::endgroup::'

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/smoke/app.pid ]; then
            kill "$(cat /tmp/smoke/app.pid)" 2>/dev/null || true
          fi

      - name: Stop Postgres
        if: always()
        run: |
          docker logs splitpro-smoke-db 2>&1 | tail -50 || true
          docker rm -f splitpro-smoke-db || true
